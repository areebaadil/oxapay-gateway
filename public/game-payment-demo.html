<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CryptoQuest - Game Wallet</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh;
      color: #fff;
    }

    /* Header */
    .game-header {
      background: rgba(0, 0, 0, 0.4);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid #ff6b6b;
    }

    .game-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 24px;
      font-weight: bold;
      color: #ff6b6b;
    }

    .game-logo svg {
      width: 36px;
      height: 36px;
      fill: #ff6b6b;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .user-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff6b6b 0%, #feca57 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
    }

    /* Main Content */
    .main-container {
      max-width: 480px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    /* Wallet Card */
    .wallet-card {
      background: linear-gradient(145deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 32px;
      margin-bottom: 24px;
      backdrop-filter: blur(10px);
    }

    .wallet-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .wallet-header h2 {
      font-size: 18px;
      color: #a0a0a0;
      margin-bottom: 8px;
      font-weight: normal;
    }

    .gem-balance {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .gem-icon {
      width: 48px;
      height: 48px;
    }

    .gem-amount {
      font-size: 48px;
      font-weight: bold;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .gem-label {
      font-size: 20px;
      color: #667eea;
      margin-left: 4px;
    }

    /* Deposit Section */
    .deposit-section {
      background: rgba(0,0,0,0.3);
      border-radius: 16px;
      padding: 24px;
    }

    .deposit-title {
      font-size: 16px;
      color: #a0a0a0;
      margin-bottom: 16px;
      text-align: center;
    }

    .amount-input-wrapper {
      margin-bottom: 20px;
    }

    .amount-input-container {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 4px;
      transition: border-color 0.3s;
    }

    .amount-input-container:focus-within {
      border-color: #667eea;
    }

    .currency-badge {
      background: #26A17B;
      color: white;
      padding: 14px 18px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 14px;
    }

    .amount-input {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 28px;
      font-weight: bold;
      padding: 12px 16px;
      text-align: right;
      outline: none;
      width: 100%;
    }

    .amount-input::placeholder {
      color: #4a4a6a;
    }

    .quick-amounts {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }

    .quick-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #ccc;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 14px;
    }

    .quick-btn:hover {
      background: rgba(102, 126, 234, 0.2);
      border-color: #667eea;
      color: #fff;
    }

    .gems-preview {
      text-align: center;
      padding: 16px;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .gems-preview-label {
      font-size: 13px;
      color: #a0a0a0;
      margin-bottom: 4px;
    }

    .gems-preview-value {
      font-size: 24px;
      font-weight: bold;
      color: #667eea;
    }

    .deposit-button {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .deposit-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }

    .deposit-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Config Panel */
    .config-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      border: 2px solid rgba(255,255,255,0.2);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .config-toggle svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    .config-panel {
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 320px;
      background: rgba(20, 20, 40, 0.95);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 24px;
      backdrop-filter: blur(10px);
    }

    .config-panel.hidden {
      display: none;
    }

    .config-panel h3 {
      margin-bottom: 16px;
      font-size: 16px;
    }

    .config-panel .form-group {
      margin-bottom: 12px;
    }

    .config-panel label {
      display: block;
      font-size: 12px;
      color: #a0a0a0;
      margin-bottom: 6px;
    }

    .config-panel input[type="text"],
    .config-panel input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
    }

    .config-panel input:focus {
      outline: none;
      border-color: #667eea;
    }

    .save-config-btn {
      width: 100%;
      padding: 12px;
      background: #667eea;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
      margin-top: 8px;
    }

    /* Success Animation */
    .success-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .success-overlay.active {
      display: flex;
    }

    .success-content {
      text-align: center;
      animation: popIn 0.5s ease;
    }

    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .success-icon {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .success-icon svg {
      width: 50px;
      height: 50px;
      stroke: white;
    }

    .success-title {
      font-size: 28px;
      margin-bottom: 12px;
    }

    .success-gems {
      font-size: 36px;
      font-weight: bold;
      color: #667eea;
      margin-bottom: 24px;
    }

    .success-btn {
      padding: 14px 40px;
      background: #667eea;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    /* Info text */
    .info-text {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #666;
    }

    .info-text a {
      color: #667eea;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="game-header">
    <div class="game-logo">
      <svg viewBox="0 0 24 24">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
        <line x1="12" y1="22.08" x2="12" y2="12"/>
      </svg>
      CryptoQuest
    </div>
    <div class="user-info">
      <div class="user-avatar">P</div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-container">
    <!-- Wallet Card -->
    <div class="wallet-card">
      <div class="wallet-header">
        <h2>Your Gem Balance</h2>
        <div class="gem-balance">
          <svg class="gem-icon" viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2">
            <polygon points="12 2 2 7 12 12 22 7 12 2"/>
            <polyline points="2 17 12 22 22 17"/>
            <polyline points="2 12 12 17 22 12"/>
          </svg>
          <span class="gem-amount" id="gemBalance">0</span>
          <span class="gem-label">GEMS</span>
        </div>
      </div>

      <div class="deposit-section">
        <div class="deposit-title">Buy Gems with USDT</div>
        
        <div class="amount-input-wrapper">
          <div class="amount-input-container">
            <span class="currency-badge">USDT</span>
            <input type="number" class="amount-input" id="depositAmount" placeholder="0" min="1" oninput="updatePreview()">
          </div>
        </div>

        <div class="quick-amounts">
          <button class="quick-btn" onclick="setAmount(10)">$10</button>
          <button class="quick-btn" onclick="setAmount(25)">$25</button>
          <button class="quick-btn" onclick="setAmount(50)">$50</button>
          <button class="quick-btn" onclick="setAmount(100)">$100</button>
        </div>

        <div class="gems-preview">
          <div class="gems-preview-label">You will receive</div>
          <div class="gems-preview-value"><span id="gemsPreview">0</span> Gems</div>
        </div>

        <button class="deposit-button" id="depositBtn" onclick="deposit()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="12 2 2 7 12 12 22 7 12 2"/>
            <polyline points="2 17 12 22 22 17"/>
            <polyline points="2 12 12 17 22 12"/>
          </svg>
          <span id="depositBtnText">Deposit & Get Gems</span>
        </button>
      </div>
    </div>

    <p class="info-text">
      Secure payment powered by CryptoGate<br>
      1 USDT = 100 Gems
    </p>
  </main>

  <!-- Config Toggle -->
  <button class="config-toggle" onclick="toggleConfig()">
    <svg viewBox="0 0 24 24">
      <path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/>
      <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
    </svg>
  </button>

  <!-- Config Panel -->
  <div class="config-panel hidden" id="configPanel">
    <h3>⚙️ API Settings</h3>
    <div class="form-group">
      <label>Merchant API Key</label>
      <input type="password" id="apiKey" placeholder="pk_xxxxxxxx_...">
    </div>
    <button class="save-config-btn" onclick="saveConfig()">Save & Close</button>
  </div>

  <!-- Success Overlay -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-content">
      <div class="success-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="3">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h2 class="success-title">Payment Successful!</h2>
      <div class="success-gems">+<span id="successGems">0</span> Gems</div>
      <button class="success-btn" onclick="closeSuccess()">Continue Playing</button>
    </div>
  </div>

  <script>
    const GEMS_PER_USDT = 100;
    const API_BASE = 'https://hhioqglejbjcqcmqqsnj.supabase.co/functions/v1/merchant-api';
    
    // Load saved data
    let gemBalance = parseInt(localStorage.getItem('gameGemBalance')) || 0;
    let apiKey = localStorage.getItem('gameApiKey') || '';
    
    document.getElementById('gemBalance').textContent = gemBalance.toLocaleString();
    document.getElementById('apiKey').value = apiKey;

    function setAmount(amount) {
      document.getElementById('depositAmount').value = amount;
      updatePreview();
    }

    function updatePreview() {
      const amount = parseFloat(document.getElementById('depositAmount').value) || 0;
      document.getElementById('gemsPreview').textContent = (amount * GEMS_PER_USDT).toLocaleString();
    }

    function toggleConfig() {
      document.getElementById('configPanel').classList.toggle('hidden');
    }

    function saveConfig() {
      apiKey = document.getElementById('apiKey').value.trim();
      localStorage.setItem('gameApiKey', apiKey);
      toggleConfig();
      alert('Settings saved!');
    }

    async function deposit() {
      const amount = parseFloat(document.getElementById('depositAmount').value);
      
      if (!amount || amount < 1) {
        alert('Please enter an amount (minimum $1)');
        return;
      }

      if (!apiKey) {
        alert('Please configure your API key first (click the gear icon)');
        toggleConfig();
        return;
      }

      const btn = document.getElementById('depositBtn');
      const btnText = document.getElementById('depositBtnText');
      btn.disabled = true;
      btnText.textContent = 'Processing...';

      try {
        const currentUrl = window.location.href.split('?')[0];
        const gems = amount * GEMS_PER_USDT;
        
        const response = await fetch(`${API_BASE}/payments`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            amount: amount,
            currency: 'USD',
            pay_currency: 'USDT',
            order_id: `game_${Date.now()}`,
            description: `Purchase ${gems} gems`,
            success_url: `${currentUrl}?success=1&gems=${gems}`,
            failure_url: `${currentUrl}?failed=1`
          })
        });

        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.error || 'API request failed');
        }

        if (data.success && data.data) {
          const paymentUrl = data.data.hosted_payment_url || data.data.hosted_deposit_page_url;
          if (paymentUrl) {
            // Save pending gems for when user returns
            localStorage.setItem('pendingGems', gems.toString());
            // Redirect to payment page
            window.location.href = paymentUrl;
          } else {
            throw new Error('No payment URL received');
          }
        } else {
          throw new Error(data.error || 'Failed to create payment');
        }
      } catch (error) {
        console.error('Payment error:', error);
        alert('Error: ' + error.message);
      } finally {
        btn.disabled = false;
        btnText.textContent = 'Deposit & Get Gems';
      }
    }

    function showSuccess(gems) {
      document.getElementById('successGems').textContent = gems.toLocaleString();
      document.getElementById('successOverlay').classList.add('active');
    }

    function closeSuccess() {
      document.getElementById('successOverlay').classList.remove('active');
    }

    // Handle return from payment page
    function handleReturn() {
      const params = new URLSearchParams(window.location.search);
      
      if (params.get('success') === '1') {
        const gems = parseInt(params.get('gems')) || parseInt(localStorage.getItem('pendingGems')) || 0;
        
        if (gems > 0) {
          gemBalance += gems;
          localStorage.setItem('gameGemBalance', gemBalance.toString());
          document.getElementById('gemBalance').textContent = gemBalance.toLocaleString();
          localStorage.removeItem('pendingGems');
          
          // Clear URL and show success
          window.history.replaceState({}, '', window.location.pathname);
          showSuccess(gems);
        }
      } else if (params.get('failed') === '1') {
        localStorage.removeItem('pendingGems');
        window.history.replaceState({}, '', window.location.pathname);
        alert('Payment was not completed. Please try again.');
      }
    }

    // Check for return on page load
    handleReturn();
  </script>
</body>
</html>
